---
name: VM Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vm-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vm-test:
    name: Server + Pi PXE Boot
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            cloud-image-utils \
            systemd-container \
            ansible

      - name: Install qemu-rpi (static binary + pxeboot firmware)
        run: |
          gh release download -R fpgas-online/rpi-qemu \
            -p 'qemu-rpi-static-linux-amd64.tar.gz' \
            -p 'qemu-rpi-pxeboot_*.deb' \
            -D /tmp/qemu-rpi --clobber
          sudo tar xzf /tmp/qemu-rpi/qemu-rpi-static-linux-amd64.tar.gz \
            -C /usr/local/bin/
          sudo dpkg -i /tmp/qemu-rpi/qemu-rpi-pxeboot_*.deb
          rm -rf /tmp/qemu-rpi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Enable KVM (if available)
        run: |
          if [ -e /dev/kvm ]; then
            echo "KVM_AVAILABLE=true" >> "$GITHUB_ENV"
            sudo chmod 666 /dev/kvm
            echo "KVM acceleration enabled"
          else
            echo "KVM_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "KVM not available, using TCG (slower)"
          fi

      - name: Install Python dependencies
        run: uv pip install paramiko --system

      - name: Cache VM images
        uses: actions/cache@v4
        with:
          path: tests/vm/images
          key: vm-images-bookworm-v2

      - name: Run VM integration tests (server + Pi PXE boot)
        run: uv run tests/vm/run_tests.py --phase all

      - name: Upload serial logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serial-logs
          path: tests/vm/workdir/*-serial.log
          if-no-files-found: ignore
