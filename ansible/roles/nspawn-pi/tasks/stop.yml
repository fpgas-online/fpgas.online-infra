---
# Stop the nspawn+sshd container and clean up.
# Killing the nspawn process automatically tears down all namespace
# mounts — no manual unmount needed.

- name: Stop nspawn sshd
  shell: pkill -f "systemd-nspawn.*{{ nspawn_root }}.*sshd" || true

- name: Wait for nspawn to exit
  wait_for:
    host: 127.0.0.1
    port: "{{ nspawn_sshd_port }}"
    timeout: 10
    state: stopped

- name: Remove policy-rc.d
  file:
    path: "{{ nspawn_root }}/usr/sbin/policy-rc.d"
    state: absent
