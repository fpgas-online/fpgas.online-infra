---
# Prepare the Pi NFS root for Ansible access via SSH chroot wrapper.
# Creates a 'piroot' user on the server whose shell is a script that
# chroots into the NFS root. Ansible connects via SSH to piroot@server
# and all commands execute inside the ARM chroot (qemu-user-static).

- name: Install qemu-user-static
  apt:
    name: qemu-user-static
    state: present

- name: Ensure binfmt_misc is mounted and ARM handler registered
  shell: |
    if ! mountpoint -q /proc/sys/fs/binfmt_misc; then
      mount binfmt_misc -t binfmt_misc /proc/sys/fs/binfmt_misc
    fi
    if [ ! -f /proc/sys/fs/binfmt_misc/qemu-arm ]; then
      systemctl restart binfmt-support || update-binfmts --enable qemu-arm
    fi
    test -f /proc/sys/fs/binfmt_misc/qemu-arm
  changed_when: false

- name: Mount filesystems for chroot
  shell: |
    mountpoint -q "{{ nspawn_root }}/proc" || mount --bind /proc "{{ nspawn_root }}/proc"
    mountpoint -q "{{ nspawn_root }}/sys" || mount --bind /sys "{{ nspawn_root }}/sys"
    mountpoint -q "{{ nspawn_root }}/dev" || mount --bind /dev "{{ nspawn_root }}/dev"
    mountpoint -q "{{ nspawn_root }}/dev/pts" || mount --bind /dev/pts "{{ nspawn_root }}/dev/pts"
  changed_when: false

- name: Install policy-rc.d to suppress service starts during apt
  copy:
    dest: "{{ nspawn_root }}/usr/sbin/policy-rc.d"
    content: |
      #!/bin/sh
      exit 101
    mode: "0755"

- name: Create chroot wrapper shell script
  copy:
    dest: /usr/local/bin/chroot-shell
    content: |
      #!/bin/bash
      # Wrapper shell that executes commands inside the Pi NFS root chroot.
      # Used as the login shell for the piroot user so Ansible can connect
      # via SSH and have all commands run in the ARM chroot.
      exec chroot {{ nspawn_root }} /bin/bash "$@"
    mode: "0755"

- name: Create piroot user with chroot shell
  user:
    name: piroot
    shell: /usr/local/bin/chroot-shell
    create_home: true
    system: false

- name: Set up SSH authorized_keys for piroot
  ansible.posix.authorized_key:
    user: piroot
    state: present
    key: "{{ lookup('file', ansible_ssh_private_key_file + '.pub') }}"
  when: ansible_ssh_private_key_file is defined
