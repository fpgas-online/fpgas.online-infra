---
# pistat - real-time Pi status via WebSocket
# pip install handled by fpgas-online-site.yml
# Pi-side scripts (send.py, send_stat.py) are in the fpgas-online-setup-pi deb

- name: Install redis
  apt:
    name:
      - redis
  tags:
    - pistat

- name: Run Django collectstatic for pistat
  community.general.django_manage:
    command: collectstatic --noinput
    project_path: "{{ django_dir }}"
    virtualenv: "{{ django_dir }}/venv"
  tags:
    - pistat
    - index.html

- name: Install dnsmasq send_stat.conf
  copy:
    src: "{{ role_path }}/../pxe/files/send_stat.conf"
    dest: /etc/dnsmasq.d/send_stat.conf
    mode: preserve
  notify: restart dnsmasq
  tags:
    - pistat
