---
- name: create tftp root directory
  file:
    path: /srv/tftp
    state: directory

- name: link bootcode.bin in tftp root because pi netboot not too smart.
  file:
    src: "{{ nfs_root }}/boot/bootcode.bin"
    dest: "/srv/tftp/bootcode.bin"
    state: link

- name: link pi serial-num to boot dir, cuz that is how it works.
  file:
    src: "{{ nfs_root }}/boot"
    dest: "/srv/tftp/{{ item.sn }}"
    state: link
  with_items:
    "{{ switch.nos }}"
  tags:
    - pibs

- name: save the original config.txt, cmdline.txt, fstab
  command: mv "{{ nfs_root }}/{{ item }}" "{{ nfs_root }}/{{ item }}.org"
  args:
    removes: "{{ nfs_root }}/{{ item }}"
    creates: "{{ nfs_root }}/{{ item }}.org"
  with_items:
    # - "boot/config.txt"
    - "boot/cmdline.txt"
    - "boot/user-data"
    - "root/fstab"
  tags:
    - netboot

- name: replace cmdline with netbootie versions
  template:
    src: "templates/boot/{{ item }}.j2"
    dest: "{{ nfs_root }}/boot/{{ item }}"
  with_items:
    - cmdline.txt
  tags:
    - cmdline
    - netboot

- name: fstab - replace local fs to nfs
  template:
    src: "templates/etc/{{ item }}.j2"
    dest: "{{ nfs_root }}/root/etc/{{ item }}"
  with_items:
    - fstab
  tags:
    - cmdline
    - netboot

- name: create pi user in NFS root if missing
  command: >-
    chroot-mount-pi-fs.bash "{{ nfs_root }}" "/tmp/pi"
    "id -u {{ user }} 2>/dev/null || useradd -m -s /bin/bash --uid 1000 {{ user }}"
  tags:
    - netboot
    - qemu

- name: ensure DNS resolution works in chroot
  copy:
    remote_src: true
    src: /etc/resolv.conf
    dest: "{{ nfs_root }}/root/etc/resolv.conf"
    force: false
  tags:
    - netboot

- name: install nfs-common into pi's fs
  command: chroot-mount-pi-fs.bash "{{ nfs_root }}" "/tmp/pi" "{{ item }}"
  with_items:
    - "apt update"
    - "apt install -y nfs-common overlayroot"
  tags:
    - netboot
    - qemu

# The chroot-regenerated initramfs (with overlayroot hooks) is written to
# the rootfs /boot directory, but TFTP serves the FAT partition's initramfs8.
# Copy the newest regenerated initramfs over the FAT one so the Pi boots with
# overlayroot support. On real hardware this copy happens automatically via
# the raspi-firmware hook, but that hook doesn't run correctly in our chroot.
- name: find regenerated v8 initramfs (with overlayroot)
  find:
    paths: "{{ nfs_root }}/root/boot"
    patterns: "initrd.img-*-v8"
  register: fixpi_regenerated_initramfs
  tags:
    - netboot
    - qemu

- name: copy regenerated initramfs to FAT partition TFTP path
  copy:
    remote_src: true
    src: "{{ fixpi_regenerated_initramfs.files[0].path }}"
    dest: "{{ nfs_root }}/boot/initramfs8"
    mode: "0755"
  when: fixpi_regenerated_initramfs.files | length > 0
  tags:
    - netboot
    - qemu

# Enable ssh.service directly in the NFS root. RPi OS ships with ssh.service
# disabled by default, to be enabled on first boot by sshswitch.service which
# looks for /boot/firmware/ssh. But /boot/firmware is mounted noauto in our
# fstab, so sshswitch never finds the file. Enable ssh.service unconditionally
# here since we always want remote access on the Pi.
- name: enable ssh.service in NFS root
  file:
    src: /lib/systemd/system/ssh.service
    dest: "{{ nfs_root }}/root/etc/systemd/system/multi-user.target.wants/ssh.service"
    state: link
  tags:
    - netboot
    - qemu

# Disable regenerate_ssh_host_keys.service — it unconditionally deletes and
# regenerates host keys on first boot via ssh-keygen -A. Under QEMU TCG this
# takes minutes per key (RSA is slowest), delaying sshd startup and blocking
# all Pi test automation. We pre-generate keys in the next task so ssh.service
# has valid host keys to use immediately.
- name: disable regenerate_ssh_host_keys.service in NFS root
  file:
    path: "{{ nfs_root }}/root/etc/systemd/system/multi-user.target.wants/regenerate_ssh_host_keys.service"
    state: absent
  tags:
    - netboot
    - qemu

# Pre-generate SSH host keys in the NFS root so sshd starts immediately without
# waiting for ssh-keygen (slow under QEMU TCG ARM emulation). Generated here
# on the server (native amd64 ssh-keygen), which is both faster and produces
# valid keys that the Pi's sshd accepts directly.
- name: check if SSH host keys already exist in NFS root
  stat:
    path: "{{ nfs_root }}/root/etc/ssh/ssh_host_ed25519_key"
  register: fixpi_ssh_host_key_stat
  tags:
    - netboot
    - qemu

- name: pre-generate SSH host keys in NFS root
  command: >-
    ssh-keygen -q -N "" -t {{ item.type }}
    -f {{ nfs_root }}/root/etc/ssh/ssh_host_{{ item.type }}_key
  with_items:
    - {type: rsa}
    - {type: ecdsa}
    - {type: ed25519}
  when: not fixpi_ssh_host_key_stat.stat.exists
  tags:
    - netboot
    - qemu
