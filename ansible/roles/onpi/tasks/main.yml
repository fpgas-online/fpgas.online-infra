---
- include_tasks: apt.yml

# Install the fpgas-online-setup-pi deb which provides:
# - zsh/tmux shell environment
# - profile.d scripts, SSH/keyboard config
# - pistat reporter scripts and systemd services
# - arty board detection services
# - network interface naming (.link files)
- name: Install fpgas-online-setup-pi
  ansible.builtin.apt:
    name: fpgas-online-setup-pi
    state: present
  tags:
    - setup-pi
    - fpgas-apt

- include_tasks: nonfs.yml
- {include_tasks: tftpd.yml, tags: tftpd}
- {include_tasks: sshkeys.yml, tags: sshkeys}
- {include_tasks: tweeks.yml, tags: pitweeks}
