---
# Install zsh and tmux

- name: Install packages
  apt:
    name:
      - tmux
      - zsh
  tags:
    - tmux

# Copy zprofile to ~/.zprofile
# Copy tmux.conf to ~/.tmux.conf

- name:
  copy:
    src: "files/tmux/{{item}}"
    dest: "/home/pi/.{{item}}"
    mode: u+x
  with_items:
    - zshrc
    - zprofile
    - tmux.conf
  tags:
    - tmux

# Set shell for pi user to zsh
- name: set shell to zsh
  user:
    name: pi
    shell: /usr/bin/zsh
  tags:
    - tmux
