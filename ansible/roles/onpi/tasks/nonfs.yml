- name: let kernel figure out nfs ver
  # (4.x doesn't work with overlayfs)
  # Remove nfsvers=4.2 from cmdline.txt if present.
  # Path varies: /boot/firmware/cmdline.txt on newer Pi OS, /boot/cmdline.txt on older.
  # fixpi/netboot.yml already sets nfsvers=3, so this is a safety net.
  replace:
    path: "{{ item }}"
    regexp: "nfsvers=4.2"
    replace: ""
  failed_when: false
  with_items:
    - /boot/firmware/cmdline.txt
    - /boot/cmdline.txt
