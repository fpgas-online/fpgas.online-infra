---
- name: Check dnsmasq service active
  command: systemctl is-active dnsmasq
  changed_when: false
  register: pxe_dnsmasq_active
  failed_when: false

- name: Assert dnsmasq service is active
  assert:
    that: pxe_dnsmasq_active.stdout == "active"
    fail_msg: "dnsmasq service is not active (got: {{ pxe_dnsmasq_active.stdout }})"

- name: Check /etc/dnsmasq.d/rpi.conf exists
  stat:
    path: /etc/dnsmasq.d/rpi.conf
  register: pxe_rpi_conf_stat

- name: Assert /etc/dnsmasq.d/rpi.conf exists
  assert:
    that: pxe_rpi_conf_stat.stat.exists
    fail_msg: "/etc/dnsmasq.d/rpi.conf not found"

- name: Check /etc/dnsmasq.d/pibs.conf exists
  stat:
    path: /etc/dnsmasq.d/pibs.conf
  register: pxe_pibs_conf_stat

- name: Assert /etc/dnsmasq.d/pibs.conf exists
  assert:
    that: pxe_pibs_conf_stat.stat.exists
    fail_msg: "/etc/dnsmasq.d/pibs.conf not found"

- name: Read /etc/dnsmasq.d/pibs.conf
  command: cat /etc/dnsmasq.d/pibs.conf
  changed_when: false
  register: pxe_pibs_content

- name: Assert pibs.conf contains dhcp-host=
  assert:
    that: "'dhcp-host=' in pxe_pibs_content.stdout"
    fail_msg: "/etc/dnsmasq.d/pibs.conf does not contain 'dhcp-host='"

- name: Check /srv/tftp directory exists
  stat:
    path: /srv/tftp
  register: pxe_tftp_dir_stat

- name: Assert /srv/tftp directory exists
  assert:
    that: pxe_tftp_dir_stat.stat.exists and pxe_tftp_dir_stat.stat.isdir
    fail_msg: "/srv/tftp directory not found"

# Check TFTP serial directories — these are symlinks to nfs_root/boot
# created by fixpi/netboot.yml for each Pi in switch.nos
- name: Check TFTP serial directories exist
  stat:
    path: "/srv/tftp/{{ item.sn }}"
  register: pxe_serial_dir_stat
  with_items: "{{ switch.nos }}"

- name: Assert TFTP serial directories exist
  assert:
    that: item.stat.exists
    fail_msg: "/srv/tftp/{{ item.item.sn }} not found"
  with_items: "{{ pxe_serial_dir_stat.results }}"

- name: Check kernel8.img accessible via TFTP path
  stat:
    path: "/srv/tftp/{{ item.sn }}/kernel8.img"
  register: pxe_kernel_stat
  with_items: "{{ switch.nos }}"

- name: Assert kernel8.img exists
  assert:
    that: item.stat.exists
    fail_msg: "/srv/tftp/{{ item.item.sn }}/kernel8.img not found"
  with_items: "{{ pxe_kernel_stat.results }}"

- name: Check cmdline.txt accessible via TFTP path
  stat:
    path: "/srv/tftp/{{ item.sn }}/cmdline.txt"
  register: pxe_cmdline_stat
  with_items: "{{ switch.nos }}"

- name: Assert cmdline.txt exists and contains nfsroot
  assert:
    that: item.stat.exists
    fail_msg: "/srv/tftp/{{ item.item.sn }}/cmdline.txt not found"
  with_items: "{{ pxe_cmdline_stat.results }}"
