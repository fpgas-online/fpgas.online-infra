---
# PXE test client support for QEMU raspi3b VMs.
# Only included when pxe_test_clients is defined.
#
# The QEMU Pi VM uses U-Boot to emulate the VideoCore PXE boot sequence,
# issuing the same TFTP requests as a real RPi. dnsmasq serves the same
# files it would to real hardware. U-Boot then loads kernel8.img + DTB
# from the serial-number TFTP directory and boots into the NFS root.

- name: Install u-boot-tools for mkimage
  apt:
    name:
      - u-boot-tools
  tags:
    - pxe-test

- name: Copy U-Boot boot script source
  copy:
    src: files/boot.scr.txt
    dest: /srv/tftp/boot.scr.txt
  tags:
    - pxe-test

- name: Compile U-Boot boot script
  command: mkimage -T script -C none -n "Pi PXE boot" -d /srv/tftp/boot.scr.txt /srv/tftp/boot.scr
  tags:
    - pxe-test

- name: Add DHCP host entries for test clients
  lineinfile:
    path: /etc/dnsmasq.d/pibs.conf
    line: "dhcp-host={{ item.mac }},{{ item.name }},{{ item.ip }}"
    create: false
  with_items: "{{ pxe_test_clients }}"
  notify: restart dnsmasq
  tags:
    - pxe-test
