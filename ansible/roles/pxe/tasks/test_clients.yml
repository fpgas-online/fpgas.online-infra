---
# PXE test client support.
# Only included when pxe_test_clients is defined.
#
# Adds DHCP host entries for test clients and injects the test SSH key
# into the Pi's authorized_keys in the NFS root. All TFTP boot files
# (kernel, DTB, cmdline.txt, config.txt, initramfs) come from the
# production fixpi/netboot.yml setup — no test-specific overrides.

- name: Add DHCP host entries for test clients
  lineinfile:
    path: /etc/dnsmasq.d/pibs.conf
    line: "dhcp-host={{ item.mac }},{{ item.name }},{{ item.ip }}"
    create: false
  with_items: "{{ pxe_test_clients }}"
  notify: restart dnsmasq
  tags:
    - pxe-test

- name: Add test SSH key to Pi authorized_keys
  ansible.posix.authorized_key:
    user: "{{ user }}"
    state: present
    key: "{{ lookup('file', ansible_ssh_private_key_file + '.pub') }}"
    path: "{{ nfs_root }}/root/home/{{ user }}/.ssh/authorized_keys"
  with_items: "{{ pxe_test_clients }}"
  when: ansible_ssh_private_key_file is defined
  tags:
    - pxe-test

- name: Fix SSH authorized_keys ownership for test clients
  file:
    path: "{{ nfs_root }}/root/home/{{ user }}/.ssh"
    recurse: true
    owner: "1000"
    group: "1000"
  when: ansible_ssh_private_key_file is defined
  tags:
    - pxe-test
